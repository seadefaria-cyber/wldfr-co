<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
    <title>WLDFR</title>
    <meta name="description" content="WLDFR is a seeding-first digital agency in New York City for artists, labels, and brands that lead culture.">
    <meta property="og:title" content="WLDFR">
    <meta property="og:description" content="A seeding-first digital agency for artists, labels & brands that lead culture, not chase it. New York City.">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23b23a2b'/><text x='50%25' y='22' text-anchor='middle' font-family='Helvetica,sans-serif' font-size='13' fill='%23f2ece1' font-weight='bold'>W</text></svg>">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root { --accent: #b23a2b; }

        body {
            background: #f5f1ea;
            color: #1c1917;
            font-family: 'Inter', Helvetica, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }
        a { color: inherit; text-decoration: none; }

        /* Noise */
        .noise {
            position: fixed; inset: 0; pointer-events: none;
            z-index: 6000; opacity: 0.03; mix-blend-mode: hard-light;
        }
        .noise canvas { width: 100%; height: 100%; display: block; }

        /* ======= NAV ======= */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            padding: 28px 40px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo {
            font-family: 'Inter', sans-serif;
            font-size: 18px; font-weight: 900; letter-spacing: 0.5px;
            color: #1c1917; transition: opacity 0.8s ease;
        }
        .logo .logo-accent { color: var(--accent); }
        .logo.faded { opacity: 0; pointer-events: none; }
        .nav-links { display: flex; gap: 36px; list-style: none; }
        .nav-links a {
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 2.2px;
            text-transform: uppercase; color: #1c1917; opacity: 0.65;
            transition: opacity 0.3s, color 0.3s;
        }
        .nav-links a:hover { opacity: 1; color: var(--accent); }

        /* ======= SCROLL CUE ======= */
        .scroll-cue {
            position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 14px;
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 2.2px;
            text-transform: uppercase; color: #1c1917; cursor: pointer;
            opacity: 0; transition: opacity 0.6s ease, color 0.3s ease; z-index: 50;
        }
        .scroll-cue.visible { opacity: 1; }
        .scroll-cue:hover { color: var(--accent); }
        .scroll-cue .arrow { display: inline-block; font-size: 14px; animation: bob 1.8s ease-in-out infinite; }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

        /* ======= HERO ======= */
        .hero {
            height: 100vh; height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
        }
        .hero-logo {
            height: clamp(240px, 50vh, 520px);
            width: auto;
            opacity: 0;
            animation: fadeIn 1.6s ease forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .visually-hidden {
            position: absolute; width: 1px; height: 1px; overflow: hidden;
            clip: rect(0 0 0 0); white-space: nowrap;
        }

        /* ======= CLIENTS (moving marquee, lv8-style) ======= */
        .clients { padding: 60px 0; background: #f5f1ea; border-top: 1px solid #e7ded0; overflow: hidden; }
        .clients-eyebrow {
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
            text-transform: uppercase; color: #1c1917; opacity: 0.4;
            text-align: center; margin-bottom: 40px;
        }
        .marquee {
            position: relative; width: 100%; overflow: hidden;
            -webkit-mask-image: linear-gradient(to right, transparent, #000 7%, #000 93%, transparent);
            mask-image: linear-gradient(to right, transparent, #000 7%, #000 93%, transparent);
        }
        .marquee-track {
            display: flex; align-items: center; gap: clamp(48px, 6vw, 88px);
            width: max-content; animation: scrollLeft 42s linear infinite;
        }
        .clients:hover .marquee-track { animation-play-state: paused; }
        .marquee-track img {
            height: 28px; width: auto; flex-shrink: 0;
            opacity: 0.5; transition: opacity 0.3s ease;
        }
        .marquee-track img.mid  { height: 34px; }
        .marquee-track img.sq   { height: 40px; }
        .marquee-track img.tall { height: 50px; }
        .marquee-track img:hover { opacity: 0.95; }
        @keyframes scrollLeft { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* ======= SERVICES ======= */
        .services { padding: 150px 80px 140px; background: #f5f1ea; }
        .services-inner { max-width: 1280px; margin: 0 auto; }
        .services-eyebrow {
            font-family: 'Inter', sans-serif;
            font-size: 11px; font-weight: 700; letter-spacing: 2.5px;
            text-transform: uppercase; color: #1c1917; opacity: 0.5; margin-bottom: 80px;
        }
        .services-grid { display: grid; grid-template-columns: 1fr auto; gap: 48px; align-items: stretch; }
        .services-list {
            list-style: none; display: flex; flex-direction: column; gap: 40px; counter-reset: svc;
        }
        .services-list li { line-height: 1; position: relative; cursor: pointer; }
        .services-list li::before {
            counter-increment: svc;
            content: counter(svc, decimal-leading-zero);
            color: var(--accent);
            font-family: 'Inter', sans-serif; font-weight: 700; font-size: 11px; letter-spacing: 2px;
            display: block; margin-bottom: 14px;
        }
        .services-list h3 {
            font-family: 'Inter', Helvetica, sans-serif;
            font-weight: 900; font-size: clamp(54px, 11vw, 170px);
            letter-spacing: -5px; line-height: 0.92; color: #1c1917;
            transition: color 0.3s ease, transform 0.4s cubic-bezier(.2,.7,.2,1);
            transform-origin: left center;
        }
        .services-list h3.serif-moment {
            font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 600;
            font-size: clamp(62px, 11.8vw, 185px); letter-spacing: -3px; line-height: 0.9;
        }
        .services-list h3.serif-roman {
            font-family: 'Fraunces', Georgia, serif; font-style: normal; font-weight: 700;
            font-size: clamp(58px, 11vw, 170px); letter-spacing: -3.5px; line-height: 0.9;
        }
        .services-list li:hover h3 { color: var(--accent); transform: translateX(0.35vw); }

        .campaigns-label {
            position: relative; display: flex; align-items: stretch; gap: 28px; padding-left: 24px;
        }
        .campaigns-rule {
            width: 2px; background: #cfc4b2; transform: scaleY(0); transform-origin: top;
            transition: transform 1.2s cubic-bezier(.77,0,.18,1);
        }
        .campaigns-word {
            writing-mode: vertical-rl; transform: rotate(180deg);
            font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 600;
            font-size: clamp(52px, 9vw, 130px); letter-spacing: -1.5px; line-height: 1;
            align-self: center; color: #1c1917; opacity: 0;
            transition: opacity 1s ease 0.4s, letter-spacing 1s ease 0.4s;
        }
        .services.is-in .campaigns-rule { transform: scaleY(1); }
        .services.is-in .campaigns-word { opacity: 1; letter-spacing: 2px; }

        .services-subtitle {
            margin: 48px 0 0; max-width: 62ch;
            font-family: 'Inter', Helvetica, sans-serif; font-style: italic; font-weight: 400;
            font-size: clamp(16px, 1.5vw, 22px); line-height: 1.35; letter-spacing: -0.2px;
            color: var(--accent); min-height: 2.8em;
        }
        .services-subtitle__text {
            display: inline-block;
            transition: transform 0.45s cubic-bezier(.2,.7,.2,1), opacity 0.3s ease;
            will-change: transform, opacity;
        }
        .services-subtitle__text.is-out { opacity: 0; transform: translateY(8px); }
        .services-subtitle__text.is-in  { opacity: 0; transform: translateY(-8px); }

        /* ======= CONTACT ======= */
        .contact {
            min-height: 100vh; display: flex; flex-direction: column; justify-content: center;
            padding: 120px 80px 140px; background: #f5f1ea;
        }
        .contact-inner { max-width: 1280px; width: 100%; margin: 0 auto; }
        .contact h2 {
            font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 600;
            font-size: clamp(72px, 12vw, 200px); letter-spacing: -3px; line-height: 0.9;
            color: var(--accent); margin-bottom: 72px;
        }
        .form { display: flex; flex-direction: column; gap: 28px; width: 100%; max-width: 720px; }
        .form-field { display: flex; flex-direction: column; gap: 8px; }
        .form-field label {
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.2px;
            text-transform: uppercase; color: #1c1917; opacity: 0.5;
        }
        .form input, .form textarea {
            background: transparent; border: none; border-bottom: 1px solid #1c1917; color: #1c1917;
            font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 500; letter-spacing: -0.3px;
            padding: 12px 0; outline: none; transition: border-color 0.3s;
            -webkit-appearance: none; border-radius: 0; width: 100%;
        }
        .form input:focus, .form textarea:focus {
            border-bottom-color: var(--accent); border-bottom-width: 2px; padding-bottom: 11px;
        }
        .form textarea { resize: none; height: 90px; }
        .form button {
            background: #1c1917; color: #f5f1ea; border: none;
            font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 900; letter-spacing: 2.5px;
            text-transform: uppercase; padding: 22px 36px; cursor: pointer; transition: background 0.25s;
            align-self: flex-start; margin-top: 16px; display: inline-flex; align-items: center; gap: 14px;
        }
        .form button .arrow { transition: transform 0.25s; display: inline-block; }
        .form button:hover { background: var(--accent); }
        .form button:hover .arrow { transform: translateX(6px); }

        /* ======= FOOTER ======= */
        footer {
            padding: 40px 48px; border-top: 1px solid #1c1917;
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2.2px;
            text-transform: uppercase; color: #1c1917; background: #f5f1ea;
        }
        footer a { color: #1c1917; transition: color 0.3s; }
        footer a:hover { color: var(--accent); }
        footer .footer-links { display: flex; gap: 28px; align-items: center; }
        footer .footer-email { color: var(--accent); }

        /* ======= RESPONSIVE ======= */
        @media (max-width: 768px) {
            nav { padding: 20px 20px; }
            .nav-links { display: none; }
            .clients { padding: 44px 0; }
            .marquee-track { gap: 44px; }
            .marquee-track img { height: 24px; }
            .services { padding: 100px 24px 80px; }
            .services-eyebrow { margin-bottom: 48px; }
            .services-list { gap: 28px; }
            .services-list h3 { letter-spacing: -2.5px; }
            .services-grid { grid-template-columns: 1fr; gap: 32px; }
            .services-list li:hover h3 { transform: none; }
            .services-subtitle { font-size: 15px; min-height: 3.6em; margin-top: 32px; }
            .campaigns-label { flex-direction: row; align-items: center; justify-content: flex-start; padding: 16px 0 0; gap: 16px; }
            .campaigns-rule { width: 40%; height: 2px; transform: scaleX(0); transform-origin: left; transition: transform 1.1s cubic-bezier(.77,0,.18,1); }
            .services.is-in .campaigns-rule { transform: scaleX(1); }
            .campaigns-word { writing-mode: horizontal-tb; transform: none; font-size: clamp(28px, 9vw, 56px); letter-spacing: 1px; }
            .services.is-in .campaigns-word { letter-spacing: 2px; }
            .contact { padding: 80px 24px; }
            .contact h2 { letter-spacing: -3px; margin-bottom: 48px; }
            .form { max-width: 100%; }
            footer { padding: 20px; flex-direction: column; gap: 10px; }
        }
        @media (prefers-reduced-motion: reduce) {
            .hero-logo { opacity: 1 !important; animation: none; }
            .marquee-track { animation: none; }
            .services-subtitle__text { transition: opacity 0.15s ease; transform: none !important; }
            .services-list h3 { transition: color 0.2s ease; transform: none !important; }
            .campaigns-rule, .campaigns-word { transition: none; }
        }
    </style>
</head>
<body>

<div class="noise"><canvas id="noise"></canvas></div>

<nav>
    <a href="#services" class="logo">WLDFR<span class="logo-accent">.</span></a>
    <ul class="nav-links">
        <li><a href="#services">Work</a></li>
        <li><a href="#contact">Let's Work</a></li>
    </ul>
</nav>

<!-- Hero -->
<section class="hero" id="hero">
    <h1 class="visually-hidden">WLDFR</h1>
    <img class="hero-logo" src="assets/brand/wldfr-logo-terracotta.png" alt="WLDFR">

    <a href="#clients" class="scroll-cue" id="scrollCue">
        <span class="arrow">↓</span>
        <span>The Work</span>
    </a>
</section>

<!-- Clients -->
<section class="clients" id="clients">
    <p class="clients-eyebrow">Trusted by the names that move culture</p>
    <div class="marquee">
        <div class="marquee-track" id="clientTrack">
            <img src="assets/logos-verified/live-nation.png" alt="Live Nation">
            <img class="tall" src="assets/logos-verified/interscope.png" alt="Interscope Records">
            <img src="assets/logos-verified/republic-records.png" alt="Republic Records">
            <img class="tall" src="assets/logos-verified/cactus-jack.png" alt="Cactus Jack">
            <img class="tall" src="assets/logos-verified/lyrical-lemonade.png" alt="Lyrical Lemonade TV">
            <img class="mid" src="assets/logos-verified/summer-smash.png" alt="Summer Smash">
            <img class="sq" src="assets/logos-verified/twitch.png" alt="Twitch">
            <img src="assets/logos-verified/kick.png" alt="Kick">
            <img src="assets/logos-verified/whop.png" alt="Whop">
            <img class="sq" src="assets/logos-verified/asspizza.png" alt="ASSPIZZA">
        </div>
    </div>
</section>

<!-- Services -->
<section class="services" id="services">
    <div class="services-inner">
        <p class="services-eyebrow">What We Do</p>
        <div class="services-grid">
            <ul class="services-list">
                <li data-desc="A deep network of pages, creators, and channels. We place your drop where culture already lives."><h3>SEEDING</h3></li>
                <li data-desc="Clippers on standby and full live production. From shoot to post to seeded, in-house."><h3 class="serif-moment">Production</h3></li>
                <li data-desc="Paid placement and the right creators. Reach bought through channels people actually trust."><h3 class="serif-roman">PAID MEDIA</h3></li>
            </ul>
            <aside class="campaigns-label" aria-hidden="true">
                <span class="campaigns-rule"></span>
                <span class="campaigns-word">CAMPAIGNS</span>
            </aside>
        </div>
        <p class="services-subtitle" aria-live="polite">
            <span class="services-subtitle__text">We don't chase trends. We light them.</span>
        </p>
    </div>
</section>

<!-- Contact -->
<section class="contact" id="contact">
    <div class="contact-inner">
        <h2>let's work.</h2>
        <form class="form" action="https://formsubmit.co/sean@wldfr.co" method="POST">
            <input type="hidden" name="_subject" value="New inquiry from wldfr.co">
            <input type="hidden" name="_captcha" value="false">
            <div class="form-field">
                <label for="f-name">Name</label>
                <input id="f-name" type="text" name="name" required>
            </div>
            <div class="form-field">
                <label for="f-email">Email</label>
                <input id="f-email" type="email" name="email" required>
            </div>
            <div class="form-field">
                <label for="f-project">Artist / Project / Brand</label>
                <input id="f-project" type="text" name="project">
            </div>
            <div class="form-field">
                <label for="f-message">Tell us about it</label>
                <textarea id="f-message" name="message"></textarea>
            </div>
            <button type="submit">Send <span class="arrow">→</span></button>
        </form>
    </div>
</section>

<footer>
    <span>&copy; 2026 WLDFR&trade; &nbsp;·&nbsp; New York City</span>
    <span class="footer-links">
        <a href="mailto:sean@wldfr.co" class="footer-email">sean@wldfr.co</a>
        <a href="https://instagram.com/wldfyre" target="_blank" rel="noopener">Instagram ↗</a>
    </span>
</footer>

<script>
// ======= CLIENT MARQUEE (duplicate for seamless -50% loop) =======
(function(){ var t = document.getElementById('clientTrack'); if (t) t.innerHTML += t.innerHTML; })();

// ======= NOISE =======
const nc = document.getElementById('noise');
const nx = nc.getContext('2d');
function szN() { nc.width = window.innerWidth; nc.height = window.innerHeight; }
szN(); window.addEventListener('resize', szN);
let nf = 0;
function grain() {
    if (++nf % 3 !== 0) { requestAnimationFrame(grain); return; }
    const w = nc.width, h = nc.height;
    const img = nx.createImageData(w, h);
    const d = img.data;
    for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255;
        d[i] = d[i+1] = d[i+2] = v; d[i+3] = 255;
    }
    nx.putImageData(img, 0, 0);
    requestAnimationFrame(grain);
}
grain();

// ======= HERO: reveal scroll cue, fade nav logo over hero, restore on scroll =======
const navLogo = document.querySelector('.logo');
setTimeout(() => { document.getElementById('scrollCue')?.classList.add('visible'); }, 900);
setTimeout(() => { if (window.scrollY < window.innerHeight * 0.5) navLogo?.classList.add('faded'); }, 1400);
document.getElementById('hero').addEventListener('click', () => {
    document.getElementById('clients').scrollIntoView({ behavior: 'smooth' });
});
window.addEventListener('scroll', () => {
    navLogo?.classList.toggle('faded', window.scrollY < window.innerHeight * 0.5);
}, { passive: true });

// ======= SERVICES SCROLL REVEAL =======
const servicesSection = document.querySelector('.services');
if (servicesSection && 'IntersectionObserver' in window) {
    const io = new IntersectionObserver((entries, obs) => {
        entries.forEach(e => { if (e.isIntersecting) { servicesSection.classList.add('is-in'); obs.unobserve(servicesSection); } });
    }, { threshold: 0.35 });
    io.observe(servicesSection);
}

// ======= SERVICE HOVER (morphing subtitle) + CLICK TO CONTACT =======
(function() {
    const list = document.querySelector('.services-list');
    const items = document.querySelectorAll('.services-list li');
    const slot = document.querySelector('.services-subtitle__text');
    if (!list || !items.length || !slot) return;
    const DEFAULT = slot.textContent;
    let current = DEFAULT, token = 0;
    function swap(next) {
        if (next === current) return;
        current = next; const id = ++token;
        slot.classList.add('is-out');
        slot.addEventListener('transitionend', function handler() {
            slot.removeEventListener('transitionend', handler);
            if (id !== token) return;
            slot.textContent = next;
            slot.classList.remove('is-out'); slot.classList.add('is-in');
            requestAnimationFrame(() => requestAnimationFrame(() => slot.classList.remove('is-in')));
        }, { once: true });
    }
    items.forEach(li => {
        li.addEventListener('mouseenter', () => swap(li.dataset.desc || DEFAULT));
        li.addEventListener('click', () => {
            document.getElementById('contact')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
    });
    list.addEventListener('mouseleave', () => swap(DEFAULT));
})();
</script>
</body>
</html>
