<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WLDFR — New York</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap');

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #1C1C1C;
      color: #F4F3F1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      overflow-x: hidden;
    }

    /* ===== HERO ===== */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1C1C1C;
      position: relative;
    }

    .freshener-assembly {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: swing 4s ease-in-out infinite;
      transform-origin: top center;
    }

    @keyframes swing {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    /* String */
    .string {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .string-loop {
      width: 10px;
      height: 10px;
      border: 1.5px solid rgba(244, 243, 241, 0.35);
      border-radius: 50%;
      margin-bottom: -1px;
    }

    .string-line {
      width: 1px;
      height: 80px;
      background: rgba(244, 243, 241, 0.25);
    }

    /* Tree */
    .tree-container {
      position: relative;
      width: 140px;
      height: 180px;
    }

    .tree-shape {
      width: 100%;
      height: 100%;
      position: relative;
      clip-path: polygon(
        50% 0%,
        15% 30%,
        22% 30%,
        5% 55%,
        15% 55%,
        0% 80%,
        12% 80%,
        12% 82%,
        30% 82%,
        30% 95%,
        35% 100%,
        65% 100%,
        70% 95%,
        70% 82%,
        88% 82%,
        88% 80%,
        100% 80%,
        85% 55%,
        95% 55%,
        78% 30%,
        85% 30%,
        50% 0%
      );
      background: #2D8B5E;
      overflow: hidden;
    }

    .tree-shape::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        linear-gradient(
          to bottom,
          #2D8B5E 42%,
          #E63946 42%,
          #E63946 50%,
          #FF6B35 50%,
          #FF6B35 58%,
          #FFD166 58%,
          #FFD166 66%,
          #2D8B5E 66%
        );
    }

    .tree-trunk {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 20px;
      height: 18px;
      background: #5C4033;
      border-radius: 0 0 3px 3px;
    }

    /* Fire embers */
    .ember-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }

    .ember-particle {
      position: absolute;
      border-radius: 50%;
      animation: emberFloat linear infinite;
    }

    .ember-particle:nth-child(1) { width: 3px; height: 3px; background: #FF6B35; left: 25%; bottom: 20%; animation-duration: 2.5s; animation-delay: 0s; }
    .ember-particle:nth-child(2) { width: 4px; height: 4px; background: #FFD166; left: 60%; bottom: 15%; animation-duration: 3s; animation-delay: 0.5s; }
    .ember-particle:nth-child(3) { width: 2px; height: 2px; background: #FFE066; left: 40%; bottom: 25%; animation-duration: 2.8s; animation-delay: 1s; }
    .ember-particle:nth-child(4) { width: 3px; height: 3px; background: #FF6B35; left: 70%; bottom: 18%; animation-duration: 3.2s; animation-delay: 1.5s; }
    .ember-particle:nth-child(5) { width: 2px; height: 2px; background: #FFD166; left: 35%; bottom: 22%; animation-duration: 2.6s; animation-delay: 0.8s; }
    .ember-particle:nth-child(6) { width: 3px; height: 3px; background: #FFE066; left: 55%; bottom: 12%; animation-duration: 3.5s; animation-delay: 2s; }

    @keyframes emberFloat {
      0% { opacity: 0; transform: translateY(0) translateX(0); }
      10% { opacity: 0.9; }
      50% { opacity: 0.6; transform: translateY(-60px) translateX(8px); }
      80% { opacity: 0.2; }
      100% { opacity: 0; transform: translateY(-120px) translateX(-5px); }
    }

    /* Glow at top of tree */
    .tree-glow {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 40px;
      background: radial-gradient(ellipse, rgba(255,107,53,0.3) 0%, transparent 70%);
      animation: glowPulse 2s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% { opacity: 0.4; transform: translateX(-50%) scaleY(1); }
      50% { opacity: 0.8; transform: translateX(-50%) scaleY(1.2); }
    }

    /* Brand text */
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 48px;
      letter-spacing: 0.15em;
      color: #F4F3F1;
      margin-top: 32px;
      line-height: 1;
    }

    .brand-location {
      font-family: 'Inter', sans-serif;
      font-style: italic;
      font-size: 12px;
      color: rgba(244, 243, 241, 0.4);
      margin-top: 8px;
      letter-spacing: 0.05em;
    }

    /* ===== ABOUT ===== */
    .about {
      background: #0a0a0a;
      padding: 120px 60px;
    }

    .about-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: start;
    }

    .about-headline {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 7vw, 90px);
      line-height: 0.95;
      color: #F4F3F1;
    }

    .about-headline .accent {
      color: #C45C26;
    }

    .about-body {
      font-size: 16px;
      line-height: 1.7;
      color: rgba(244, 243, 241, 0.7);
      font-weight: 300;
      max-width: 480px;
    }

    .stats-row {
      max-width: 1200px;
      margin: 80px auto 0;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      border-top: 1px solid rgba(244, 243, 241, 0.08);
      padding-top: 48px;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .stat-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: 0.12em;
      color: #C45C26;
      text-transform: uppercase;
    }

    .stat-desc {
      font-size: 13px;
      line-height: 1.5;
      color: rgba(244, 243, 241, 0.45);
      font-weight: 300;
    }

    /* ===== CONTACT ===== */
    .contact {
      background: #1C1C1C;
      padding: 120px 60px;
      text-align: center;
    }

    .contact-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(36px, 5vw, 56px);
      color: #FF6B35;
      letter-spacing: 0.05em;
      margin-bottom: 32px;
    }

    .contact-form {
      max-width: 440px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .contact-form input,
    .contact-form textarea {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 14px 18px;
      background: rgba(244, 243, 241, 0.06);
      border: 1px solid rgba(244, 243, 241, 0.12);
      border-radius: 8px;
      color: #F4F3F1;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: rgba(244, 243, 241, 0.3);
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #C45C26;
    }

    .contact-form textarea {
      resize: vertical;
      min-height: 100px;
    }

    .contact-form button {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 0.1em;
      padding: 14px 32px;
      background: #F4F3F1;
      color: #1C1C1C;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .contact-form button:hover {
      background: #FF6B35;
      color: #F4F3F1;
    }

    .contact-location {
      font-size: 13px;
      color: rgba(244, 243, 241, 0.35);
      margin-top: 16px;
      letter-spacing: 0.05em;
    }

    /* ===== FOOTER ===== */
    .footer {
      background: #0a0a0a;
      padding: 40px 60px;
      text-align: center;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(244, 243, 241, 0.25);
      letter-spacing: 0.08em;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .tree-container {
        width: 100px;
        height: 130px;
      }

      .string-line {
        height: 50px;
      }

      .brand-name {
        font-size: 36px;
        margin-top: 24px;
      }

      .about {
        padding: 80px 24px;
      }

      .about-inner {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .about-body {
        max-width: 100%;
      }

      .stats-row {
        grid-template-columns: 1fr;
        gap: 32px;
        margin-top: 56px;
        padding-top: 40px;
      }

      .contact {
        padding: 80px 24px;
      }

      .footer {
        padding: 32px 24px;
      }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="freshener-assembly">
      <div class="string">
        <div class="string-loop"></div>
        <div class="string-line"></div>
      </div>
      <div class="tree-container">
        <div class="tree-glow"></div>
        <div class="tree-shape"></div>
        <div class="ember-container">
          <div class="ember-particle"></div>
          <div class="ember-particle"></div>
          <div class="ember-particle"></div>
          <div class="ember-particle"></div>
          <div class="ember-particle"></div>
          <div class="ember-particle"></div>
        </div>
      </div>
      <div class="brand-name">WLDFR</div>
      <div class="brand-location">New York</div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="contact">
    <div class="contact-heading">START A PROJECT</div>
    <form class="contact-form" action="https://formspree.io/f/sean@defaria.nyc" method="POST">
      <input type="text" name="name" placeholder="Name" required>
      <input type="email" name="email" placeholder="Email" required>
      <input type="text" name="project" placeholder="Project Name">
      <textarea name="message" placeholder="Tell us about your project" rows="4"></textarea>
      <button type="submit">Get Started</button>
    </form>
    <div class="contact-location">New York</div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-text">&copy; 2026 WLDFR</div>
  </footer>

</body>
</html>
