<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wldfr - New York</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== MAIN LAYOUT ===== */
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #4854E0;
      transition: background-color 3s ease;
    }

    /* ===== HEAT CURSOR ===== */
    .heat-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .heat-dot {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 80, 30, 0.08) 0%, transparent 70%);
      transform: translate(-50%, -50%) scale(0.5);
      animation: heatFade 1.2s ease-out forwards;
      pointer-events: none;
    }

    @keyframes heatFade {
      0% { transform: translate(-50%, -50%) scale(0.5); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(2.5); opacity: 0; }
    }

    /* ===== LOGO ===== */
    .logo-wrap {
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      transition: transform 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      position: relative;
      z-index: 2;
    }

    .logo-wrap:hover {
      transform: translateY(-4px);
    }

    .logo-wrap:hover .logo-img {
      filter: brightness(0.3) sepia(1) saturate(5) hue-rotate(-10deg) drop-shadow(0 0 20px rgba(255, 120, 60, 0.35)) drop-shadow(0 0 60px rgba(255, 80, 30, 0.15));
    }

    .logo-img {
      width: 140px;
      height: auto;
      display: block;
      filter: brightness(0);
      transition: filter 8s ease;
    }

    /* ===== CTA TEXT ===== */
    .cta-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 0.25em;
      color: rgba(0, 0, 0, 0.5);
      cursor: pointer;
      margin-top: 16px;
      background: none;
      border: none;
      padding: 8px 0;
      transition: color 0.3s ease;
      opacity: 0;
      animation: fadeInUp 0.8s ease 1s forwards;
      position: relative;
      z-index: 2;
    }

    .cta-text:hover {
      color: #8B2020;
    }

    /* ===== FOOTER ===== */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 14px 0;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
      z-index: 2;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(0, 0, 0, 0.2);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: #4854E0;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 12px;
      padding: 40px;
      width: 90%;
      max-width: 440px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(0, 0, 0, 0.4);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .modal-close:hover {
      color: #8B2020;
    }

    .modal-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: #000000;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.4);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: #000000;
      background: rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(0, 0, 0, 0.3);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #000000;
    }

    .form-group textarea {
      height: 90px;
      resize: vertical;
    }

    .form-submit {
      margin-top: 24px;
      width: 100%;
      padding: 12px 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #ffffff;
      background: #000000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .form-submit:hover {
      background: #8B2020;
      color: #ffffff;
    }

    /* ===== FIRE RIPPLE ===== */
    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    .fire-ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 100, 30, 0.8);
      background: radial-gradient(circle, rgba(255, 80, 20, 0.15) 0%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      animation: fireRipple 0.6s ease-out forwards;
    }

    .fire-ripple.delay {
      animation-delay: 0.1s;
      border-width: 1px;
    }

    @keyframes fireRipple {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
        border-color: rgba(255, 100, 30, 0.8);
      }
      50% {
        border-color: rgba(255, 60, 20, 0.5);
      }
      100% {
        transform: translate(-50%, -50%) scale(8);
        opacity: 0;
        border-color: rgba(255, 40, 10, 0);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .logo-img {
        width: 100px;
      }

      .cta-text {
        font-size: 11px;
      }

      .modal-card {
        padding: 28px 24px;
      }

      .modal-heading {
        font-size: 1.3rem;
      }
    }

    @media (max-height: 600px) {
      .logo-img {
        width: 90px;
      }

      .cta-text {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="page" id="page">
    <div class="heat-layer" id="heatLayer"></div>

    <div class="logo-wrap" id="logo" onclick="fireRipple(event)">
      <img src="mellencamp/images/wldfr-white.png" alt="WLDFR" class="logo-img">
    </div>

    <footer class="footer">
      <div class="footer-text">WLDFR NYC</div>
    </footer>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-heading">START A PROJECT</div>
      <form action="https://formspree.io/f/sean@defaria.nyc" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="project">Project Name</label>
          <input type="text" id="project" name="project">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <button type="submit" class="form-submit">GET STARTED</button>
      </form>
    </div>
  </div>

  <div class="ripple-container" id="rippleContainer"></div>

  <script>
    var modal = document.getElementById('modal');
    var page = document.getElementById('page');
    var logo = document.getElementById('logo');
    var heatLayer = document.getElementById('heatLayer');

    // Any interactive element hover: background slowly turns red over 30s, returns in 3s
    function startHeat() {
      page.style.transition = 'background-color 30s ease';
      page.style.backgroundColor = '#8B2020';
    }

    function stopHeat() {
      page.style.transition = 'background-color 3s ease';
      page.style.backgroundColor = '#4854E0';
    }

    // Apply to logo, CTA button, and footer
    var hotElements = document.querySelectorAll('.logo-wrap, .footer-text');
    hotElements.forEach(function(el) {
      el.addEventListener('mouseenter', startHeat);
      el.addEventListener('mouseleave', stopHeat);
    });

    // Heat effect (mouse on desktop, tap on mobile)
    var lastHeat = 0;

    function createHeat(x, y) {
      var heat = document.createElement('div');
      heat.className = 'heat-dot';
      heat.style.left = x + 'px';
      heat.style.top = y + 'px';
      heatLayer.appendChild(heat);
      setTimeout(function() { heat.remove(); }, 1200);
    }

    // Desktop: mousemove
    document.addEventListener('mousemove', function(e) {
      var now = Date.now();
      if (now - lastHeat < 50) return;
      lastHeat = now;
      createHeat(e.clientX, e.clientY);
    });

    // Mobile: touchstart and touchmove
    document.addEventListener('touchstart', function(e) {
      var touch = e.touches[0];
      createHeat(touch.clientX, touch.clientY);
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      var now = Date.now();
      if (now - lastHeat < 80) return;
      lastHeat = now;
      var touch = e.touches[0];
      createHeat(touch.clientX, touch.clientY);
    }, { passive: true });

    // Modal controls
    function openModal() {
      modal.classList.add('active');
    }

    function closeModal() {
      modal.classList.remove('active');
    }

    // Fire ripple on button click, then open modal
    function fireRipple(e) {
      var container = document.getElementById('rippleContainer');
      var rect = e.target.getBoundingClientRect();
      var x = rect.left + rect.width / 2;
      var y = rect.top + rect.height / 2;

      var ripple1 = document.createElement('div');
      ripple1.className = 'fire-ripple';
      ripple1.style.left = x + 'px';
      ripple1.style.top = y + 'px';
      container.appendChild(ripple1);

      var ripple2 = document.createElement('div');
      ripple2.className = 'fire-ripple delay';
      ripple2.style.left = x + 'px';
      ripple2.style.top = y + 'px';
      container.appendChild(ripple2);

      setTimeout(function() {
        modal.classList.add('active');
        ripple1.remove();
        ripple2.remove();
      }, 500);
    }

    // Close modal on backdrop click or Escape
    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
