<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wldfr - New York</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== MAIN LAYOUT ===== */
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #8B2020;
    }

    /* ===== HEAT CURSOR ===== */
    .heat-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .heat-blob {
      position: absolute;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 100, 30, 0.15) 0%, rgba(255, 60, 20, 0.08) 30%, transparent 70%);
      transform: translate(-50%, -50%);
      animation: heatBlobFade 1.5s ease-out forwards;
      pointer-events: none;
    }

    .heat-glow {
      position: absolute;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 200, 50, 0.06) 0%, transparent 60%);
      transform: translate(-50%, -50%);
      animation: heatGlowFade 2s ease-out forwards;
      pointer-events: none;
    }

    .heat-spark {
      position: absolute;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: rgba(255, 150, 50, 0.7);
      transform: translate(-50%, -50%);
      animation: sparkRise 0.8s ease-out forwards;
      pointer-events: none;
    }

    @keyframes heatBlobFade {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.6); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(1.8); }
    }

    @keyframes heatGlowFade {
      0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
      100% { opacity: 0; transform: translate(-50%, -50%) scale(2); }
    }

    @keyframes sparkRise {
      0% { opacity: 0.8; transform: translate(-50%, -50%) translateY(0); }
      100% { opacity: 0; transform: translate(-50%, -50%) translateY(-40px); }
    }

    /* ===== LOGO ===== */
    .logo-wrap {
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
      transition: transform 0.5s ease, filter 0.5s ease;
      position: relative;
      z-index: 2;
    }

    .logo-wrap:hover {
      transform: scale(1.05);
    }

    .logo-wrap:hover .logo-img {
      filter: sepia(1) saturate(5) brightness(0.4) hue-rotate(-20deg) drop-shadow(0 0 30px rgba(180, 40, 20, 0.5));
    }

    .logo-img {
      width: 140px;
      height: auto;
      display: block;
      filter: sepia(1) saturate(3) brightness(0.8) hue-rotate(-10deg);
      transition: filter 3s ease;
    }

    /* ===== FOOTER ===== */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 14px 0;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
      z-index: 2;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(200, 160, 60, 0.4);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: #7A1B1B;
      border: 1px solid rgba(255, 200, 50, 0.15);
      border-radius: 12px;
      padding: 40px;
      width: 90%;
      max-width: 440px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .modal-close:hover {
      color: rgba(255, 200, 50, 0.8);
    }

    .modal-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: rgba(200, 160, 60, 0.9);
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: #ffffff;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 200, 50, 0.15);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: rgba(255, 200, 50, 0.5);
    }

    .form-group textarea {
      height: 90px;
      resize: vertical;
    }

    .form-submit {
      margin-top: 24px;
      width: 100%;
      padding: 12px 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #1a1a1a;
      background: rgba(200, 160, 60, 0.9);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .form-submit:hover {
      background: rgba(220, 180, 70, 1);
      color: #1a1a1a;
    }

    /* ===== FIRE RIPPLE ===== */
    .ripple-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 999;
    }

    .fire-ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 200, 50, 0.8);
      background: radial-gradient(circle, rgba(255, 180, 30, 0.2) 0%, transparent 70%);
      transform: translate(-50%, -50%) scale(0);
      animation: fireRipple 0.6s ease-out forwards;
    }

    .fire-ripple.delay {
      animation-delay: 0.1s;
      border-width: 1px;
    }

    @keyframes fireRipple {
      0% {
        transform: translate(-50%, -50%) scale(0);
        opacity: 1;
        border-color: rgba(255, 200, 50, 0.8);
      }
      50% {
        border-color: rgba(255, 160, 30, 0.5);
      }
      100% {
        transform: translate(-50%, -50%) scale(8);
        opacity: 0;
        border-color: rgba(255, 140, 20, 0);
      }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .logo-img {
        width: 100px;
      }

      .modal-card {
        padding: 28px 24px;
      }

      .modal-heading {
        font-size: 1.3rem;
      }
    }

    @media (max-height: 600px) {
      .logo-img {
        width: 90px;
      }
    }
  </style>
</head>
<body>

  <div class="page" id="page">
    <div class="heat-layer" id="heatLayer"></div>

    <div class="logo-wrap" id="logo" onclick="fireRipple(event)">
      <img src="mellencamp/images/wldfr-white.png" alt="WLDFR" class="logo-img">
    </div>

    <footer class="footer">
      <div class="footer-text">WLDFR NYC</div>
    </footer>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-heading">START A PROJECT</div>
      <form action="https://formspree.io/f/mwvradaw" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="project">Project Name</label>
          <input type="text" id="project" name="project">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <button type="submit" class="form-submit">GET STARTED</button>
      </form>
    </div>
  </div>

  <div class="ripple-container" id="rippleContainer"></div>

  <script>
    var modal = document.getElementById('modal');
    var page = document.getElementById('page');
    var logo = document.getElementById('logo');
    var heatLayer = document.getElementById('heatLayer');

    // Heat effect — desktop
    var lastBlob = 0;
    var lastGlow = 0;
    var lastSpark = 0;

    document.addEventListener('mousemove', function(e) {
      var now = Date.now();

      // Primary blob every 40ms
      if (now - lastBlob > 40) {
        lastBlob = now;
        var blob = document.createElement('div');
        blob.className = 'heat-blob';
        blob.style.left = e.clientX + 'px';
        blob.style.top = e.clientY + 'px';
        heatLayer.appendChild(blob);
        setTimeout(function() { blob.remove(); }, 1500);
      }

      // Ambient glow every 100ms
      if (now - lastGlow > 100) {
        lastGlow = now;
        var glow = document.createElement('div');
        glow.className = 'heat-glow';
        glow.style.left = e.clientX + 'px';
        glow.style.top = e.clientY + 'px';
        heatLayer.appendChild(glow);
        setTimeout(function() { glow.remove(); }, 2000);
      }

      // Sparks every 200ms with random offset
      if (now - lastSpark > 200) {
        lastSpark = now;
        var spark = document.createElement('div');
        spark.className = 'heat-spark';
        var offsetX = (Math.random() - 0.5) * 60;
        var offsetY = (Math.random() - 0.5) * 60;
        spark.style.left = (e.clientX + offsetX) + 'px';
        spark.style.top = (e.clientY + offsetY) + 'px';
        heatLayer.appendChild(spark);
        setTimeout(function() { spark.remove(); }, 800);
      }
    });

    // Heat effect — mobile (touch)
    var lastBlobTouch = 0;
    var lastGlowTouch = 0;
    var lastSparkTouch = 0;

    function handleTouch(e) {
      var touch = e.touches[0];
      if (!touch) return;
      var now = Date.now();

      if (now - lastBlobTouch > 60) {
        lastBlobTouch = now;
        var blob = document.createElement('div');
        blob.className = 'heat-blob';
        blob.style.left = touch.clientX + 'px';
        blob.style.top = touch.clientY + 'px';
        heatLayer.appendChild(blob);
        setTimeout(function() { blob.remove(); }, 1500);
      }

      if (now - lastGlowTouch > 150) {
        lastGlowTouch = now;
        var glow = document.createElement('div');
        glow.className = 'heat-glow';
        glow.style.left = touch.clientX + 'px';
        glow.style.top = touch.clientY + 'px';
        heatLayer.appendChild(glow);
        setTimeout(function() { glow.remove(); }, 2000);
      }

      if (now - lastSparkTouch > 300) {
        lastSparkTouch = now;
        var spark = document.createElement('div');
        spark.className = 'heat-spark';
        var offsetX = (Math.random() - 0.5) * 60;
        var offsetY = (Math.random() - 0.5) * 60;
        spark.style.left = (touch.clientX + offsetX) + 'px';
        spark.style.top = (touch.clientY + offsetY) + 'px';
        heatLayer.appendChild(spark);
        setTimeout(function() { spark.remove(); }, 800);
      }
    }

    document.addEventListener('touchstart', handleTouch, { passive: true });
    document.addEventListener('touchmove', handleTouch, { passive: true });

    // Modal controls
    function openModal() {
      modal.classList.add('active');
    }

    function closeModal() {
      modal.classList.remove('active');
    }

    // Fire ripple on logo click, then open modal
    function fireRipple(e) {
      var container = document.getElementById('rippleContainer');
      var rect = e.target.getBoundingClientRect();
      var x = rect.left + rect.width / 2;
      var y = rect.top + rect.height / 2;

      var ripple1 = document.createElement('div');
      ripple1.className = 'fire-ripple';
      ripple1.style.left = x + 'px';
      ripple1.style.top = y + 'px';
      container.appendChild(ripple1);

      var ripple2 = document.createElement('div');
      ripple2.className = 'fire-ripple delay';
      ripple2.style.left = x + 'px';
      ripple2.style.top = y + 'px';
      container.appendChild(ripple2);

      setTimeout(function() {
        modal.classList.add('active');
        ripple1.remove();
        ripple2.remove();
      }, 500);
    }

    // Close modal on backdrop click or Escape
    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
