<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wldfr - New York</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:ital,wght@0,300;0,400;0,500;1,300;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== MAIN LAYOUT ===== */
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: #4854E0;
      transition: background-color 3s ease;
    }

    /* ===== LOGO ===== */
    .logo-wrap {
      cursor: pointer;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }

    .logo-img {
      width: 140px;
      height: auto;
      display: block;
      filter: brightness(0);
      transition: filter 0.6s ease;
    }

    .page.red-bg .logo-img {
      filter: brightness(100);
    }

    /* ===== CTA BUTTON ===== */
    .cta-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px;
      letter-spacing: 0.2em;
      padding: 10px 32px;
      background: transparent;
      color: #000000;
      border: 1px solid rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      cursor: pointer;
      margin-top: 12px;
      opacity: 0;
      animation: fadeInUp 0.8s ease 1s forwards;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .cta-btn:hover {
      background: #000000;
      color: #ffffff;
      border-color: #000000;
    }

    .page.red-bg .cta-btn {
      color: #ffffff;
      border-color: rgba(255, 255, 255, 0.4);
    }

    .page.red-bg .cta-btn:hover {
      background: #ffffff;
      color: #000000;
      border-color: #ffffff;
    }

    /* ===== FOOTER ===== */
    .footer {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      text-align: center;
      padding: 14px 0;
      opacity: 0;
      animation: fadeIn 1s ease 1.5s forwards;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.15em;
      color: rgba(0, 0, 0, 0.2);
      transition: color 0.4s ease;
    }

    .page.red-bg .footer-text {
      color: rgba(255, 255, 255, 0.2);
    }

    /* ===== ANIMATIONS ===== */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: #4854E0;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 12px;
      padding: 40px;
      width: 90%;
      max-width: 440px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(0, 0, 0, 0.4);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .modal-close:hover {
      color: #000000;
    }

    .modal-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: 0.15em;
      color: #000000;
      margin-bottom: 28px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: rgba(0, 0, 0, 0.4);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      color: #000000;
      background: rgba(0, 0, 0, 0.08);
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.2s ease;
    }

    .form-group input::placeholder,
    .form-group textarea::placeholder {
      color: rgba(0, 0, 0, 0.3);
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #000000;
    }

    .form-group textarea {
      height: 90px;
      resize: vertical;
    }

    .form-submit {
      margin-top: 24px;
      width: 100%;
      padding: 12px 0;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.2em;
      color: #ffffff;
      background: #000000;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .form-submit:hover {
      background: #ffffff;
      color: #000000;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .logo-img {
        width: 100px;
      }

      .cta-btn {
        padding: 9px 26px;
        font-size: 12px;
      }

      .modal-card {
        padding: 28px 24px;
      }

      .modal-heading {
        font-size: 1.3rem;
      }
    }

    @media (max-height: 600px) {
      .logo-img {
        width: 90px;
      }

      .cta-btn {
        margin-top: 10px;
      }
    }
  </style>
</head>
<body>

  <div class="page" id="page">
    <div class="logo-wrap" id="logo">
      <img src="mellencamp/images/wldfr-white.png" alt="Wildfire" class="logo-img">
    </div>

    <button class="cta-btn" onclick="openModal()">START A PROJECT</button>

    <footer class="footer">
      <div class="footer-text">&copy; 2026 Wildfire New York</div>
    </footer>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-heading">START A PROJECT</div>
      <form action="https://formspree.io/f/sean@defaria.nyc" method="POST">
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
          <label for="project">Project Name</label>
          <input type="text" id="project" name="project">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" name="message"></textarea>
        </div>
        <button type="submit" class="form-submit">GET STARTED</button>
      </form>
    </div>
  </div>

  <script>
    var modal = document.getElementById('modal');
    var page = document.getElementById('page');
    var logo = document.getElementById('logo');

    logo.addEventListener('mouseenter', function() {
      page.style.transition = 'background-color 30s ease';
      page.style.backgroundColor = '#8B2020';
      page.classList.add('red-bg');
    });

    logo.addEventListener('mouseleave', function() {
      page.style.transition = 'background-color 3s ease';
      page.style.backgroundColor = '#4854E0';
      page.classList.remove('red-bg');
    });

    function openModal() {
      modal.classList.add('active');
    }

    function closeModal() {
      modal.classList.remove('active');
    }

    modal.addEventListener('click', function(e) {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') closeModal();
    });
  </script>

</body>
</html>
