<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WLDFR — New York</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #1C1C1C;
      color: #F4F3F1;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ===== MAIN LAYOUT ===== */
    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ===== SWINGING ASSEMBLY ===== */
    .freshener-assembly {
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: swing 4s ease-in-out infinite;
      transform-origin: top center;
    }

    @keyframes swing {
      0%, 100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }

    /* String from top */
    .string-line {
      width: 1px;
      height: 80px;
      background: rgba(244, 243, 241, 0.2);
    }

    /* ===== THE TREE ===== */
    .tree-wrap {
      width: 160px;
      height: 200px;
      position: relative;
    }

    .tree-wrap svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }

    /* ===== BRAND TEXT ===== */
    .brand-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 0.18em;
      color: #F4F3F1;
      margin-top: 36px;
      line-height: 1;
    }

    .brand-location {
      font-family: 'Inter', sans-serif;
      font-style: italic;
      font-size: 13px;
      color: rgba(244, 243, 241, 0.4);
      margin-top: 8px;
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    /* ===== CTA BUTTON ===== */
    .cta-button {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 16px;
      letter-spacing: 0.18em;
      padding: 12px 36px;
      background: transparent;
      color: #F4F3F1;
      border: 1px solid rgba(244, 243, 241, 0.3);
      border-radius: 0;
      cursor: pointer;
      margin-top: 32px;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }

    .cta-button:hover {
      background: #C45C26;
      color: #fff;
      border-color: #C45C26;
    }

    /* ===== FOOTER ===== */
    .footer {
      position: absolute;
      bottom: 20px;
      left: 0;
      right: 0;
      text-align: center;
    }

    .footer-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(244, 243, 241, 0.2);
      letter-spacing: 0.08em;
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-card {
      background: #1C1C1C;
      border: 1px solid rgba(244, 243, 241, 0.1);
      border-radius: 12px;
      padding: 40px;
      width: 90%;
      max-width: 440px;
      position: relative;
      transform: translateY(20px);
      transition: transform 0.3s ease;
    }

    .modal-overlay.active .modal-card {
      transform: translateY(0);
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 20px;
      background: none;
      border: none;
      color: rgba(244, 243, 241, 0.4);
      font-size: 24px;
      cursor: pointer;
      line-height: 1;
      padding: 4px;
      transition: color 0.2s ease;
    }

    .modal-close:hover {
      color: #F4F3F1;
    }

    .modal-heading {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px;
      letter-spacing: 0.1em;
      color: #F4F3F1;
      margin-bottom: 28px;
    }

    .contact-form {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .contact-form input,
    .contact-form textarea {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      padding: 14px 18px;
      background: rgba(244, 243, 241, 0.06);
      border: 1px solid rgba(244, 243, 241, 0.12);
      border-radius: 8px;
      color: #F4F3F1;
      outline: none;
      transition: border-color 0.3s ease;
      width: 100%;
    }

    .contact-form input::placeholder,
    .contact-form textarea::placeholder {
      color: rgba(244, 243, 241, 0.3);
    }

    .contact-form input:focus,
    .contact-form textarea:focus {
      border-color: #C45C26;
    }

    .contact-form textarea {
      resize: vertical;
      min-height: 100px;
    }

    .submit-btn {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px;
      letter-spacing: 0.1em;
      padding: 14px 32px;
      background: #F4F3F1;
      color: #1C1C1C;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease, color 0.3s ease;
      margin-top: 4px;
    }

    .submit-btn:hover {
      background: #C45C26;
      color: #F4F3F1;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .tree-wrap {
        width: 120px;
        height: 150px;
      }

      .string-line {
        height: 50px;
      }

      .brand-name {
        font-size: 40px;
        margin-top: 28px;
      }

      .brand-location {
        font-size: 12px;
      }

      .cta-button {
        font-size: 14px;
        padding: 10px 28px;
        margin-top: 24px;
      }

      .modal-card {
        padding: 28px 24px;
      }

      .modal-heading {
        font-size: 26px;
      }
    }

    @media (max-height: 600px) {
      .string-line {
        height: 30px;
      }

      .tree-wrap {
        width: 110px;
        height: 138px;
      }

      .brand-name {
        font-size: 36px;
        margin-top: 20px;
      }

      .cta-button {
        margin-top: 16px;
      }
    }
  </style>
</head>
<body>

  <div class="page">
    <div class="freshener-assembly">
      <!-- String -->
      <div class="string-line"></div>

      <!-- Tree -->
      <div class="tree-wrap">
        <svg viewBox="0 0 200 260" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <!-- Tree gradient: green base with horizontal stripes -->
            <linearGradient id="treeGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#3D7A5A"/>
              <stop offset="30%" stop-color="#3D7A5A"/>
              <stop offset="33%" stop-color="#8B3A2A"/>
              <stop offset="40%" stop-color="#8B3A2A"/>
              <stop offset="42%" stop-color="#3D7A5A"/>
              <stop offset="46%" stop-color="#3D7A5A"/>
              <stop offset="48%" stop-color="#C45C26"/>
              <stop offset="55%" stop-color="#C45C26"/>
              <stop offset="57%" stop-color="#3D7A5A"/>
              <stop offset="61%" stop-color="#3D7A5A"/>
              <stop offset="63%" stop-color="#D4A017"/>
              <stop offset="70%" stop-color="#D4A017"/>
              <stop offset="72%" stop-color="#3D7A5A"/>
              <stop offset="100%" stop-color="#3D7A5A"/>
            </linearGradient>
            <!-- Darker outline color -->
            <linearGradient id="outlineGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#2D5A42"/>
              <stop offset="100%" stop-color="#2D5A42"/>
            </linearGradient>
          </defs>

          <!-- Hanging hole at the very top -->
          <circle cx="100" cy="12" r="7" fill="none" stroke="#3D7A5A" stroke-width="2.5"/>

          <!-- Classic air freshener pine tree shape:
               Pointed top, 3 scalloped tiers getting wider, small trunk tab -->
          <path d="
            M100 24

            L88 52
            C84 58, 78 60, 74 56
            L68 48
            C64 44, 58 46, 60 52

            L50 72
            C46 78, 38 80, 34 76
            L28 66
            C24 62, 18 64, 20 70

            L10 100
            C6 108, 4 114, 8 118
            Q14 126, 28 128

            L60 136
            L60 140
            C58 142, 56 144, 56 148
            L56 168
            C56 174, 60 178, 66 178
            L134 178
            C140 178, 144 174, 144 168
            L144 148
            C144 144, 142 142, 140 140
            L140 136

            L172 128
            Q186 126, 192 118
            C196 114, 194 108, 190 100

            L180 70
            C182 64, 176 62, 172 66
            L166 76
            C162 80, 154 78, 150 72

            L140 52
            C142 46, 136 44, 132 48
            L126 56
            C122 60, 116 58, 112 52

            L100 24
            Z
          " fill="url(#treeGrad)" stroke="#2D5A42" stroke-width="1"/>

          <!-- Inner texture lines for realism -->
          <line x1="60" y1="90" x2="140" y2="90" stroke="rgba(0,0,0,0.06)" stroke-width="0.5"/>
          <line x1="50" y1="110" x2="150" y2="110" stroke="rgba(0,0,0,0.06)" stroke-width="0.5"/>
        </svg>
      </div>
    </div>

    <!-- Brand -->
    <div class="brand-name">WLDFR</div>
    <div class="brand-location">New York</div>

    <!-- CTA -->
    <button class="cta-button" onclick="openModal()">START A PROJECT</button>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-text">&copy; 2026 WLDFR</div>
    </footer>
  </div>

  <!-- Modal Overlay -->
  <div class="modal-overlay" id="modal">
    <div class="modal-card">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="modal-heading">START A PROJECT</div>
      <form class="contact-form" action="https://formspree.io/f/sean@defaria.nyc" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="email" name="email" placeholder="Email" required>
        <input type="text" name="project" placeholder="Project Name">
        <textarea name="message" placeholder="Tell us about your project" rows="4"></textarea>
        <button type="submit" class="submit-btn">Get Started</button>
      </form>
    </div>
  </div>

  <script>
    var modal = document.getElementById('modal');

    function openModal() {
      modal.classList.add('active');
    }

    function closeModal() {
      modal.classList.remove('active');
    }

    // Close on overlay click (not card click)
    modal.addEventListener('click', function(e) {
      if (e.target === modal) {
        closeModal();
      }
    });

    // Close on Escape key
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });
  </script>

</body>
</html>
